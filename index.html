<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Magic Particle Studio</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .input_video { display: none; }
        #ui {
            position: absolute; top: 15px; width: 100%; text-align: center;
            color: #0ff; pointer-events: none; z-index: 10;
        }
        #controls {
            position: absolute; bottom: 25px; width: 100%; display: flex;
            justify-content: center; gap: 10px; z-index: 20;
        }
        button {
            background: rgba(0, 255, 255, 0.15); border: 1px solid #0ff; color: #0ff;
            padding: 12px 20px; border-radius: 25px; cursor: pointer; text-transform: uppercase;
            font-size: 10px; letter-spacing: 1px; backdrop-filter: blur(5px);
        }
        button:active { background: #0ff; color: #000; }
        #start-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <button onclick="startApp()" style="padding: 30px; font-size: 18px;">ACTIVATE MAGIC</button>
    </div>

    <video class="input_video" playsinline></video>
    <div id="ui">
        <h2 id="status">LOADING AI...</h2>
        <div style="font-size: 10px; opacity: 0.6;">2: SATURN | 3: HEART | 4: FLOWER | FIST: EXPLODE</div>
    </div>
    
    <div id="controls">
        <button id="rec-btn">REC ⏺</button>
        <button onclick="location.reload()">RESET</button>
    </div>
    
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, particles, targetPositions, targetColor;
        let audioCtx, osc, gain, panner, destination;
        let mediaRecorder, chunks = [];
        const particleCount = 6000;
        let currentShape = 'none';
        let isExploding = false;

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            initAudio();
            initThree();
            setupRecorder();
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            gain = audioCtx.createGain();
            panner = audioCtx.createStereoPanner();
            destination = audioCtx.createMediaStreamDestination(); // For recording

            osc.type = 'sine';
            osc.connect(panner);
            panner.connect(gain);
            gain.connect(audioCtx.destination);
            gain.connect(destination); // Route to recorder
            
            gain.gain.value = 0;
            osc.start();
        }

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32,32,0,32,32,32);
            grad.addColorStop(0, 'white'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
            return new THREE.CanvasTexture(canvas);
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.getElementById('container').appendChild(renderer.domElement);

            // --- Starfield Background ---
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(3000 * 3);
            for(let i=0; i<3000*3; i++) starPos[i] = (Math.random()-0.5) * 100;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({size:0.05, color:0x444444})));

            // --- Main Particles ---
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);
            targetColor = new THREE.Color(0x00ffff);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            particles = new THREE.Points(geometry, new THREE.PointsMaterial({
                size: 0.2, map: createGlowTexture(), transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            }));
            scene.add(particles);
            
            makeSaturn();
            animate();
        }

        function setupRecorder() {
            const btn = document.getElementById('rec-btn');
            btn.onclick = () => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    btn.innerText = "REC ⏺";
                } else {
                    chunks = [];
                    const canvasStream = renderer.domElement.captureStream(30);
                    const combined = new MediaStream([
                        ...canvasStream.getVideoTracks(),
                        ...destination.stream.getAudioTracks()
                    ]);
                    mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm' });
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = 'magic_particles.webm'; a.click();
                    };
                    mediaRecorder.start();
                    btn.innerText = "STOP ⏹";
                }
            };
        }

        // --- SHAPES & AI ---
        function makeSaturn() {
            targetColor.set(0xffcc00);
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                if (i < particleCount * 0.6) {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    targetPositions[i3] = 3 * Math.sin(phi) * Math.cos(theta);
                    targetPositions[i3+1] = 3 * Math.sin(phi) * Math.sin(theta);
                    targetPositions[i3+2] = 3 * Math.cos(phi);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 5 + Math.random() * 2;
                    targetPositions[i3] = Math.cos(angle) * r;
                    targetPositions[i3+1] = (Math.random()-0.5) * 0.2;
                    targetPositions[i3+2] = Math.sin(angle) * r;
                }
            }
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6 });
        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const h = res.multiHandLandmarks[0];
                const hX = ((1 - h[9].x) - 0.5) * 22; 
                const hY = (h[9].y - 0.5) * -22;

                // Audio Theremin logic
                const f = (1 - h[9].y) * 600 + 200;
                osc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.1);
                panner.pan.setTargetAtTime((h[9].x - 0.5) * -2, audioCtx.currentTime, 0.1);
                gain.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.1);

                const tipDist = Math.hypot(h[8].x - h[0].x, h[8].y - h[0].y);
                if (tipDist < 0.2) {
                    currentShape = 'fist'; targetColor.set(0xffffff);
                    for(let i=0; i<particleCount*3; i+=3) {
                        targetPositions[i] = hX + (Math.random()-0.5)*2;
                        targetPositions[i+1] = hY + (Math.random()-0.5)*2;
                    }
                } else if (currentShape === 'fist') {
                    isExploding = true; currentShape = 'fireworks'; targetColor.set(0xff6600);
                    for (let i=0; i<particleCount; i++) {
                        const i3 = i*3, th = Math.random()*Math.PI*2, ph = Math.random()*Math.PI, s = 6+Math.random()*10;
                        targetPositions[i3] = hX + Math.sin(ph)*Math.cos(th)*s;
                        targetPositions[i3+1] = hY + Math.sin(ph)*Math.sin(th)*s;
                        targetPositions[i3+2] = Math.cos(ph)*s;
                    }
                    setTimeout(() => { isExploding = false; makeSaturn(); }, 1800);
                }
            } else if(audioCtx) { gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2); }
        });

        const cam = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            const p = particles.geometry.attributes.position;
            const l = isExploding ? 0.04 : 0.12;
            for (let i=0; i<particleCount*3; i++) {
                p.array[i] += (targetPositions[i] - p.array[i]) * l;
                if (isExploding && i%3===1) p.array[i] -= 0.05;
            }
            p.needsUpdate = true;
            particles.material.color.lerp(targetColor, 0.08);
            particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    </script>
</body>
    </html>
