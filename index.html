<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Magic Studio Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: #0ff; }
        #container { width: 100vw; height: 100vh; }
        .input_video { display: none; }
        
        /* Loading Screen */
        #loader-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #progress-container { width: 250px; height: 4px; background: #111; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #0ff; box-shadow: 0 0 10px #0ff; transition: width 0.3s; }
        
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; }
        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 20; }
        
        button {
            background: rgba(0,255,255,0.05); border: 1px solid #0ff; color: #0ff;
            padding: 12px 24px; border-radius: 30px; cursor: pointer;
            font-size: 11px; letter-spacing: 2px; backdrop-filter: blur(10px);
        }
        button:hover { background: #0ff; color: #000; }
    </style>
</head>
<body>
    <div id="loader-overlay">
        <h1 id="load-status" style="font-weight: 200; letter-spacing: 5px;">READY</h1>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <button id="start-btn" onclick="startApp()" style="margin-top: 30px; display: none;">ENTER VOID</button>
    </div>

    <video class="input_video" playsinline></video>
    <div id="ui"><h2 id="status"></h2></div>
    <div id="controls"><button id="rec-btn">RECORD VIDEO</button></div>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.querySelector('.input_video');
        const progressBar = document.getElementById('progress-bar');
        const loadStatus = document.getElementById('load-status');
        const startBtn = document.getElementById('start-btn');
        
        let scene, camera, renderer, particles, targetPositions, targetColor;
        let audioCtx, osc, gain;
        let isExploding = false;

        // --- 1. PRE-LOADING FEEDBACK ---
        window.addEventListener('load', () => {
            let p = 0;
            const interval = setInterval(() => {
                p += Math.random() * 15;
                progressBar.style.width = Math.min(p, 100) + "%";
                if(p >= 100) {
                    clearInterval(interval);
                    loadStatus.innerText = "SYSTEMS ONLINE";
                    startBtn.style.display = "block";
                }
            }, 100);
        });

        async function startApp() {
            document.getElementById('loader-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loader-overlay').remove(), 500);
            
            initAudio();
            initThree();
            setupAI();
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            gain = audioCtx.createGain();
            osc.connect(gain).connect(audioCtx.destination);
            gain.gain.value = 0;
            osc.start();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.getElementById('container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(6000 * 3);
            targetPositions = new Float32Array(6000 * 3);
            targetColor = new THREE.Color(0x00ffff);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            particles = new THREE.Points(geometry, new THREE.PointsMaterial({
                size: 0.15, color: 0x00ffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            }));
            scene.add(particles);
            animate();
        }

        function setupAI() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1, // High accuracy for ROG Ally/Engineer laptop
                minDetectionConfidence: 0.75,
                minTrackingConfidence: 0.75
            });

            hands.onResults(onResults);

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 480, height: 360 // Optimized for mobile/web browsers
            });
            cam.start();
        }

        function onResults(res) {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const hand = res.multiHandLandmarks[0];
                const hX = ((1 - hand[9].x) - 0.5) * 22; 
                const hY = (hand[9].y - 0.5) * -22;

                // Dynamic Audio
                osc.frequency.setTargetAtTime((1-hand[9].y)*700 + 150, audioCtx.currentTime, 0.1);
                gain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.1);

                // Fist Detection Logic
                const indexTip = hand[8];
                const wrist = hand[0];
                const dist = Math.hypot(indexTip.x - wrist.x, indexTip.y - wrist.y);

                if (dist < 0.23) {
                    targetColor.set(0xffffff);
                    for(let i=0; i<18000; i+=3) {
                        targetPositions[i] = hX + (Math.random()-0.5) * 1.5;
                        targetPositions[i+1] = hY + (Math.random()-0.5) * 1.5;
                    }
                } else {
                    targetColor.set(0x00ffff);
                    // Standard Float Mode
                    for(let i=0; i<18000; i+=3) {
                        targetPositions[i] = hX + Math.cos(i) * 3;
                        targetPositions[i+1] = hY + Math.sin(i) * 3;
                    }
                }
            } else if(gain) {
                gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const p = particles.geometry.attributes.position;
            for (let i=0; i<18000; i++) {
                p.array[i] += (targetPositions[i] - p.array[i]) * 0.12;
            }
            p.needsUpdate = true;
            particles.material.color.lerp(targetColor, 0.1);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
