<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracker Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .input_video { display: none; }
        #status { position: absolute; top: 10px; width: 100%; text-align: center; color: #0ff; z-index: 10; font-size: 14px; }
        #btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; background: #0ff; border: none; font-weight: bold; z-index: 100; border-radius: 8px; }
    </style>
</head>
<body>
    <button id="btn" onclick="startApp()">START SYSTEM</button>
    <div id="status">OFFLINE</div>
    <video class="input_video" playsinline></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const status = document.getElementById('status');
        const videoElement = document.getElementsByClassName('input_video')[0];
        let scene, camera, renderer, particles, targetPositions;
        const count = 4000;

        function startApp() {
            document.getElementById('btn').style.display = 'none';
            status.innerText = "LOADING AI...";
            initThree();
            setupAI();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) {
                pos[i] = (Math.random()-0.5)*20;
                targetPositions[i] = pos[i];
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(geo, new THREE.PointsMaterial({color: 0x00ffff, size: 0.1}));
            scene.add(particles);
            animate();
        }

        function setupAI() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
            
            hands.onResults((res) => {
                status.innerText = res.multiHandLandmarks.length > 0 ? "TRACKING" : "HAND NOT FOUND";
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const h = res.multiHandLandmarks[0][9]; // Palm center
                    const x = (0.5 - h.x) * 25;
                    const y = (0.5 - h.y) * 15;
                    for(let i=0; i<count*3; i+=3) {
                        targetPositions[i] = x + (Math.random()-0.5)*2;
                        targetPositions[i+1] = y + (Math.random()-0.5)*2;
                    }
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 480, height: 360
            });
            cam.start().then(() => status.innerText = "CAMERA ACTIVE");
        }

        function animate() {
            requestAnimationFrame(animate);
            const p = particles.geometry.attributes.position;
            for(let i=0; i<count*3; i++) {
                p.array[i] += (targetPositions[i] - p.array[i]) * 0.15;
            }
            p.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
