<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Refined Particle Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .input_video { display: none; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        #status { color: #0ff; margin-bottom: 20px; font-family: monospace; }
        button {
            padding: 15px 30px; background: transparent; border: 1px solid #0ff;
            color: #0ff; cursor: pointer; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="status">SYSTEM READY</div>
        <button id="startBtn" onclick="startSystem()">INITIALIZE ENGINE</button>
    </div>

    <video class="input_video" playsinline></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementsByClassName('input_video')[0];
        let scene, camera, renderer, particles, targetPos;
        const count = 6000;
        let currentShape = 'saturn';

        // --- 1. CORE INITIALIZATION ---
        function startSystem() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "DOWNLOADING AI MODELS...";
            
            initThree();
            setupAI();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            targetPos = new Float32Array(count * 3);

            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const mat = new THREE.PointsMaterial({
                color: 0x00ffff,
                size: 0.12,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            
            generateSaturn(); // Default shape
            animate();
        }

        // --- 2. SHAPE GENERATORS (The "Refined" Part) ---
        function generateSaturn() {
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                if (i < count * 0.6) { // The Planet
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    targetPos[i3] = 3 * Math.sin(phi) * Math.cos(theta);
                    targetPos[i3+1] = 3 * Math.sin(phi) * Math.sin(theta);
                    targetPos[i3+2] = 3 * Math.cos(phi);
                } else { // The Rings
                    const angle = Math.random() * Math.PI * 2;
                    const r = 5 + Math.random() * 2;
                    targetPos[i3] = Math.cos(angle) * r;
                    targetPos[i3+1] = (Math.random() - 0.5) * 0.2;
                    targetPos[i3+2] = Math.sin(angle) * r;
                }
            }
        }

        function generateHeart() {
            for (let i = 0; i < count; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const i3 = i * 3;
                targetPos[i3] = x * 0.3;
                targetPos[i3+1] = y * 0.3;
                targetPos[i3+2] = (Math.random() - 0.5) * 1;
            }
        }

        // --- 3. STABLE AI SETUP ---
        function setupAI() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424515/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0,
                minDetectionConfidence: 0.6
            });

            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const h = res.multiHandLandmarks[0];
                    const palm = h[9];
                    const offsetX = (0.5 - palm.x) * 20;
                    const offsetY = (0.5 - palm.y) * 20;

                    // Gesture Logic
                    const isIndexUp = h[8].y < h[6].y;
                    const isMiddleUp = h[12].y < h[10].y;

                    if (isIndexUp && isMiddleUp && currentShape !== 'heart') {
                        generateHeart(); currentShape = 'heart';
                        particles.material.color.set(0xff0066);
                    } else if (isIndexUp && !isMiddleUp && currentShape !== 'saturn') {
                        generateSaturn(); currentShape = 'saturn';
                        particles.material.color.set(0x00ffff);
                    }

                    // Move the entire system relative to hand
                    particles.position.x = offsetX;
                    particles.position.y = offsetY;
                }
            });

            const cameraPipe = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });

            cameraPipe.start().then(() => {
                document.getElementById('overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('overlay').remove(), 500);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const p = particles.geometry.attributes.position;
            for (let i = 0; i < count * 3; i++) {
                // Smooth Lerp to targets
                p.array[i] += (targetPos[i] - p.array[i]) * 0.1;
            }
            p.needsUpdate = true;
            particles.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
