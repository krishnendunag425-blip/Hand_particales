<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Magic: Cinematic Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .input_video { display: none; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; pointer-events: none; z-index: 10;
        }
        h2 { margin: 0; letter-spacing: 4px; font-weight: 300; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .hint { font-size: 10px; opacity: 0.5; margin-top: 5px; }
    </style>
</head>
<body>
    <video class="input_video" playsinline></video>
    <div id="ui">
        <h2 id="gesture-name">INITIALIZING AI...</h2>
        <div class="hint">FIST (EXPLODE) | 2 FINGERS (SATURN) | 3 (HEART) | 4 (FLOWER)</div>
    </div>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementsByClassName('input_video')[0];
        const gestureText = document.getElementById('gesture-name');
        let scene, camera, renderer, particles, targetPositions, targetColor;
        const particleCount = 5500; 
        let currentShape = 'none';
        let isExploding = false;

        // --- 1. TEXTURE GENERATOR (Procedural Glow) ---
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.5)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 2. THREE.JS SETUP ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ 
                antialias: false, 
                preserveDrawingBuffer: true, // Needed for trails
                powerPreference: "high-performance" 
            });
            renderer.autoClearColor = false; // Disable auto-clear to create trails
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.getElementById('container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);
            targetColor = new THREE.Color(0x00ffff);

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.18,
                map: createGlowTexture(),
                color: 0x00ffff,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize);
            makeSaturn();
            animate();
        }

        // --- 3. SHAPE ALGORITHMS ---
        function makeSaturn() {
            gestureText.innerText = "SATURN";
            targetColor.set(0xffcc00);
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                if (i < particleCount * 0.6) {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    targetPositions[i3] = 3 * Math.sin(phi) * Math.cos(theta);
                    targetPositions[i3+1] = 3 * Math.sin(phi) * Math.sin(theta);
                    targetPositions[i3+2] = 3 * Math.cos(phi);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 5 + Math.random() * 2;
                    targetPositions[i3] = Math.cos(angle) * r;
                    targetPositions[i3+1] = (Math.random() - 0.5) * 0.2;
                    targetPositions[i3+2] = Math.sin(angle) * r;
                }
            }
        }

        function makeHeart() {
            gestureText.innerText = "HEART";
            targetColor.set(0xff3366);
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const i3 = i * 3;
                targetPositions[i3] = x * 0.3;
                targetPositions[i3+1] = y * 0.3;
                targetPositions[i3+2] = (Math.random() - 0.5) * 1;
            }
        }

        function makeFlower() {
            gestureText.innerText = "FLOWER";
            targetColor.set(0x00ffaa);
            const goldenAngle = Math.PI * (3 - Math.sqrt(5));
            for (let i = 0; i < particleCount; i++) {
                const r = Math.sqrt(i) * 0.25;
                const theta = i * goldenAngle;
                const i3 = i * 3;
                targetPositions[i3] = r * Math.cos(theta);
                targetPositions[i3+1] = r * Math.sin(theta);
                targetPositions[i3+2] = 0;
            }
        }

        function triggerFirework(x, y) {
            gestureText.innerText = "BOOM!";
            isExploding = true;
            targetColor.set(0xff6600);
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2, phi = Math.random() * Math.PI;
                const speed = 6 + Math.random() * 10;
                targetPositions[i3] = x + Math.sin(phi) * Math.cos(theta) * speed;
                targetPositions[i3+1] = y + Math.sin(phi) * Math.sin(theta) * speed;
                targetPositions[i3+2] = Math.cos(phi) * speed;
            }
            setTimeout(() => { isExploding = false; makeSaturn(); }, 1800);
        }

        // --- 4. AI & CAMERA ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                const hand = results.multiHandLandmarks[0];
                const hX = ((1 - hand[9].x) - 0.5) * 22; 
                const hY = (hand[9].y - 0.5) * -22;

                const isIndexUp = hand[8].y < hand[6].y;
                const isMiddleUp = hand[12].y < hand[10].y;
                const isRingUp = hand[16].y < hand[14].y;
                const isPinkyUp = hand[20].y < hand[18].y;
                const tipToWrist = Math.hypot(hand[8].x - hand[0].x, hand[8].y - hand[0].y);

                if (tipToWrist < 0.25) { 
                    if (currentShape !== 'fist') { currentShape = 'fist'; targetColor.set(0xffffff); }
                    for(let i=0; i<particleCount*3; i+=3) {
                        targetPositions[i] = hX + (Math.random()-0.5) * 2;
                        targetPositions[i+1] = hY + (Math.random()-0.5) * 2;
                    }
                } else if (currentShape === 'fist') {
                    currentShape = 'fireworks';
                    triggerFirework(hX, hY);
                } else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
                    if(currentShape !== 'flower') { makeFlower(); currentShape = 'flower'; }
                } else if (isIndexUp && isMiddleUp && isRingUp) {
                    if(currentShape !== 'heart') { makeHeart(); currentShape = 'heart'; }
                } else if (isIndexUp && isMiddleUp) {
                    if(currentShape !== 'saturn') { makeSaturn(); currentShape = 'saturn'; }
                }
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cam.start();

        // --- 5. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Create Trail Effect: Draw a semi-transparent black rectangle over the scene
            const pos = particles.geometry.attributes.position;
            const lerp = isExploding ? 0.04 : 0.12;

            for (let i = 0; i < particleCount * 3; i++) {
                pos.array[i] += (targetPositions[i] - pos.array[i]) * lerp;
                if (isExploding && i % 3 === 1) pos.array[i] -= 0.05; // Gravity
            }

            pos.needsUpdate = true;
            particles.material.color.lerp(targetColor, 0.08); // Smooth color shift
            particles.rotation.y += 0.003;

            // This creates the motion trail by fading the previous frame
            renderer.setClearColor(0x000000, 0.15); // The 0.15 controls trail length
            renderer.clear(true, false, false); 
            
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
