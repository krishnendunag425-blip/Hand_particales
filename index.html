<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .input_video { display: none; }
        #instructions {
            position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.7);
            pointer-events: none; font-size: 12px; z-index: 10;
        }
        #status {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #00ffff; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <video class="input_video"></video>
    <div id="instructions">
        Fist → Charge<br>Open Hand → Firework<br>2 Fingers → Saturn<br>3 Fingers → Heart<br>4 Fingers → Flower
    </div>
    <div id="status">Loading AI...</div>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementsByClassName('input_video')[0];
        const statusText = document.getElementById('status');
        let scene, camera, renderer, particles, positions, targetPositions;
        const particleCount = 5000;
        let currentShape = 'none';
        let isExploding = false;

        // --- 1. THREE.JS INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Fast for mobile
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.getElementById('container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);

            for(let i=0; i<particleCount*3; i++) {
                positions[i] = (Math.random() - 0.5) * 10;
                targetPositions[i] = positions[i];
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                size: 0.06,
                color: 0x00ffff,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            window.addEventListener('resize', onWindowResize);
            animate();
            makeSaturn();
        }

        // --- 2. SHAPE GENERATORS ---
        function makeSaturn() {
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                if (i < particleCount * 0.6) {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    targetPositions[i3] = 2 * Math.sin(phi) * Math.cos(theta);
                    targetPositions[i3+1] = 2 * Math.sin(phi) * Math.sin(theta);
                    targetPositions[i3+2] = 2 * Math.cos(phi);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 3.5 + Math.random() * 1.5;
                    targetPositions[i3] = Math.cos(angle) * r;
                    targetPositions[i3+1] = (Math.random() - 0.5) * 0.2;
                    targetPositions[i3+2] = Math.sin(angle) * r;
                }
            }
        }

        function makeHeart() {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const i3 = i * 3;
                targetPositions[i3] = x * 0.2;
                targetPositions[i3+1] = y * 0.2;
                targetPositions[i3+2] = (Math.random() - 0.5) * 0.5;
            }
        }

        function makeFlower() {
            const goldenAngle = Math.PI * (3 - Math.sqrt(5));
            for (let i = 0; i < particleCount; i++) {
                const r = Math.sqrt(i) * 0.15;
                const theta = i * goldenAngle;
                const i3 = i * 3;
                targetPositions[i3] = r * Math.cos(theta);
                targetPositions[i3+1] = r * Math.sin(theta);
                targetPositions[i3+2] = (Math.random() - 0.5) * 0.2;
            }
        }

        function triggerFirework(x, y) {
            isExploding = true;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2, phi = Math.random() * Math.PI;
                const speed = 4 + Math.random() * 6;
                targetPositions[i3] = x + Math.sin(phi) * Math.cos(theta) * speed;
                targetPositions[i3+1] = y + Math.sin(phi) * Math.sin(theta) * speed;
                targetPositions[i3+2] = Math.cos(phi) * speed;
            }
            setTimeout(() => { isExploding = false; makeSaturn(); }, 1500);
        }

        // --- 3. MEDIAPIPE AI TRACKING ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            statusText.innerText = results.multiHandLandmarks.length > 0 ? "Tracking Active" : "Show your hand";
            
            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                const hand = results.multiHandLandmarks[0];
                const hX = (hand[9].x - 0.5) * -15; 
                const hY = (hand[9].y - 0.5) * -15;

                // Gestures
                const isIndexUp = hand[8].y < hand[6].y;
                const isMiddleUp = hand[12].y < hand[10].y;
                const isRingUp = hand[16].y < hand[14].y;
                const isPinkyUp = hand[20].y < hand[18].y;
                
                const tipToWrist = Math.hypot(hand[8].x - hand[0].x, hand[8].y - hand[0].y);

                if (tipToWrist < 0.2) { // FIST
                    if (currentShape !== 'fist') {
                        currentShape = 'fist';
                        particles.material.color.set(0xffffff);
                    }
                    for(let i=0; i<particleCount*3; i+=3) {
                        targetPositions[i] = hX + (Math.random()-0.5);
                        targetPositions[i+1] = hY + (Math.random()-0.5);
                    }
                } else if (currentShape === 'fist') { // EXPLODE
                    currentShape = 'fireworks';
                    particles.material.color.set(0xff4400);
                    triggerFirework(hX, hY);
                } else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
                    if(currentShape !== 'flower') { makeFlower(); currentShape = 'flower'; particles.material.color.set(0x66ff66); }
                } else if (isIndexUp && isMiddleUp && isRingUp) {
                    if(currentShape !== 'heart') { makeHeart(); currentShape = 'heart'; particles.material.color.set(0xff0066); }
                } else if (isIndexUp && isMiddleUp) {
                    if(currentShape !== 'saturn') { makeSaturn(); currentShape = 'saturn'; particles.material.color.set(0xffcc00); }
                }
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 480, height: 360
        });
        cam.start();

        // --- 4. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const pos = particles.geometry.attributes.position;
            const lerp = isExploding ? 0.05 : 0.12;

            for (let i = 0; i < particleCount * 3; i++) {
                pos.array[i] += (targetPositions[i] - pos.array[i]) * lerp;
                if (isExploding && i % 3 === 1) pos.array[i] -= 0.05; // Gravity
            }

            pos.needsUpdate = true;
            particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
