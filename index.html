<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Tracking Pro: Realme Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .input_video { display: none; }
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #status-msg { color: #0ff; font-family: monospace; margin-bottom: 20px; }
        button {
            padding: 15px 40px; background: transparent; border: 2px solid #0ff;
            color: #0ff; font-weight: bold; cursor: pointer; border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="boot-screen">
        <div id="status-msg">READY TO INITIALIZE</div>
        <button onclick="bootApp()">BOOT ENGINE</button>
    </div>

    <video class="input_video" playsinline muted></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.querySelector('.input_video');
        const statusMsg = document.getElementById('status-msg');
        let scene, camera, renderer, particles, targetPositions;
        const count = 5000;

        function bootApp() {
            statusMsg.innerText = "LINKING AI...";
            initThree();
            startAI();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);

            for (let i = 0; i < count * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 20;
                targetPositions[i] = pos[i];
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.1, blending: THREE.AdditiveBlending });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            animate();
        }

        async function startAI() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0, // 0 is better for stable mobile performance
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    statusMsg.innerText = "TRACKING ACTIVE";
                    const h = res.multiHandLandmarks[0][9]; // Palm center
                    
                    // The "Realme Fix": Better scaling for tall screens
                    const x = (0.5 - h.x) * 25;
                    const y = (0.5 - h.y) * (25 * (window.innerHeight / window.innerWidth));

                    for (let i = 0; i < count * 3; i += 3) {
                        targetPositions[i] = x + (Math.random() - 0.5) * 3;
                        targetPositions[i+1] = y + (Math.random() - 0.5) * 3;
                        targetPositions[i+2] = (Math.random() - 0.5) * 2;
                    }
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });

            cam.start().then(() => {
                document.getElementById('boot-screen').style.display = 'none';
            }).catch(e => {
                statusMsg.innerText = "CAM ERROR: " + e;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const p = particles.geometry.attributes.position;
            for (let i = 0; i < count * 3; i++) {
                p.array[i] += (targetPositions[i] - p.array[i]) * 0.15;
            }
            p.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
