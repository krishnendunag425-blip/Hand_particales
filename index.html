<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Refined Gesture Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        .input_video { display: none; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        button { padding: 20px 40px; background: #0ff; border: none; font-weight: bold; border-radius: 50px; }
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; color: #0ff; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div id="overlay"><button onclick="start()">INITIALIZE ENGINE</button></div>
    <div id="hud">SYSTEM: STANDBY</div>
    <video class="input_video" playsinline muted></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.querySelector('.input_video');
        const hud = document.getElementById('hud');
        let scene, camera, renderer, particles, targetPositions;
        const count = 5000;
        let currentShape = 'saturn';

        function start() {
            document.getElementById('overlay').style.display = 'none';
            initThree();
            initAI();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            particles = new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: 0x00ffff, size: 0.12, blending: THREE.AdditiveBlending, transparent: true 
            }));
            scene.add(particles);
            
            setSaturn();
            animate();
        }

        // --- SHAPE LOGIC ---
        function setSaturn() {
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                if (i < count * 0.6) {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    targetPositions[i3] = 3 * Math.sin(phi) * Math.cos(theta);
                    targetPositions[i3+1] = 3 * Math.sin(phi) * Math.sin(theta);
                    targetPositions[i3+2] = 3 * Math.cos(phi);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 5 + Math.random() * 1.5;
                    targetPositions[i3] = Math.cos(angle) * r;
                    targetPositions[i3+1] = (Math.random() - 0.5) * 0.2;
                    targetPositions[i3+2] = Math.sin(angle) * r;
                }
            }
        }

        function setHeart() {
            for (let i = 0; i < count; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const i3 = i * 3;
                targetPositions[i3] = x * 0.3;
                targetPositions[i3+1] = y * 0.3;
                targetPositions[i3+2] = (Math.random() - 0.5) * 1;
            }
        }

        function initAI() {
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6 });

            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const h = res.multiHandLandmarks[0];
                    const palm = h[9];
                    
                    // Interaction Scaling
                    const x = (0.5 - palm.x) * 25;
                    const y = (0.5 - palm.y) * 20;
                    particles.position.set(x, y, 0);

                    // Pinch Detection (Thumb tip 4 to Index tip 8)
                    const dist = Math.hypot(h[8].x - h[4].x, h[8].y - h[4].y);
                    if (dist < 0.05 && currentShape !== 'heart') {
                        setHeart(); currentShape = 'heart';
                        particles.material.color.set(0xff0088);
                        hud.innerText = "MODE: PINCH (HEART)";
                    } else if (dist > 0.1 && currentShape !== 'saturn') {
                        setSaturn(); currentShape = 'saturn';
                        particles.material.color.set(0x00ffff);
                        hud.innerText = "MODE: OPEN (SATURN)";
                    }
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            const p = particles.geometry.attributes.position;
            for (let i = 0; i < count * 3; i++) {
                p.array[i] += (targetPositions[i] - p.array[i]) * 0.1;
            }
            p.needsUpdate = true;
            particles.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
